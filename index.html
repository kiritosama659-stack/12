<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kỷ Yếu Của Chị 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    overflow-x: hidden;
}

.container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    color: white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

h1 {
    margin-bottom: 20px;
}

button {
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

img {
    width: 260px;
    border-radius: 20px;
    margin: 20px auto;
    display: none;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

.message {
    display: none;
    margin-top: 15px;
    line-height: 1.6;
    font-size: 18px;
}

.footer {
    margin-top: 25px;
    font-size: 14px;
    opacity: 0.8;
}

.heart {
    position: fixed;
    top: -10px;
    color: white;
    font-size: 18px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Thanh Xuân Của Chị 🌸</h1>

    <button onclick="showSurprise()">Bấm vào đây 💌</button>

    <!-- ẢNH NẰM GIỮA -->
    <img id="photo" src="chi.jpg" alt="Chị yêu">

    <div class="message" id="msg">
        Hôm nay là ngày đặc biệt nhất của chị ✨<br><br>
        Dù em không có mặt ở đó,<br>
        nhưng em luôn tự hào về chị 💖<br><br>
        Chúc chị thật rực rỡ trong ngày kỷ yếu 🌸
    </div>

    <div class="footer">
        From Hoàng 🤍
    </div>
</div>

<script>
function showSurprise() {
    document.getElementById("msg").style.display = "block";
    document.getElementById("photo").style.display = "block";

    for(let i = 0; i < 40; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "🤍";
        heart.classList.add("heart");
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }
}
</script>

</body>

</html>
